services:
  bot:
    build:
      context: .
      dockerfile: "./Dockerfile"
      tags:
        - "fluxcord:latest"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "./data:/data"
    restart: unless-stopped
    # ports:
    #   - "8765:8765"
    networks:
      - fluxcord-net

networks:
  fluxcord-net:
    driver: bridge
    name: fluxcord-net
