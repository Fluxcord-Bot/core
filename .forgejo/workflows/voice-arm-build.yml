name: Build voice ARM docker image

on:
  push:
    branches:
      - voice
  workflow_dispatch:

jobs:
  build:
    runs-on: debian

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Docker CLI
        run: apt-get update && apt-get install -y docker.io jq

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Log in to git.gay Registry
        uses: docker/login-action@v3
        with:
          registry: git.gay
          username: jbcarreon123
          password: ${{ secrets.FJ_TOKEN }}

      - name: Log in to GitHub Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: jbcarreon123
          password: ${{ secrets.GH_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: jbcrn
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=code.forgejo.org/oci/buildkit:buildx-stable-1

      - name: Build and push ARM image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          labels: |
            org.opencontainers.image.source=https://git.gay/Fluxcord/core
          tags: |
            git.gay/fluxcord/core-voice-arm64:latest
            git.gay/fluxcord/core-voice-arm64:${{ steps.pkg.outputs.version }}
            ghcr.io/fluxcord-bot/core-voice-arm64:latest
            ghcr.io/fluxcord-bot/core-voice-arm64:${{ steps.pkg.outputs.version }}
            jbcrn/fluxcord-core-voice-arm64:latest
            jbcrn/fluxcord-core-voice-arm64:${{ steps.pkg.outputs.version }}
